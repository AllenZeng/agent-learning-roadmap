site_name: AI Agent Learning Roadmap
site_description: 从最小 Agent 循环到增强能力，再到完整 Agent 系统设计。
site_url: https://allenzeng.github.io/agent-learning-roadmap/

repo_url: https://github.com/AllenZeng/agent-learning-roadmap
repo_name: AllenZeng/agent-learning-roadmap
edit_uri: edit/main/

docs_dir: docs
site_dir: site
use_directory_urls: true

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.highlight
    - search.suggest
  palette:
    - scheme: default
      primary: black
      accent: teal
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - scheme: slate
      primary: black
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - 中文:
      - 首页: README.md
      - 课程大纲: syllabus.md
      - 中文课程:
          - 01 初识 Agent: courses/course-01-first-encounter.md
          - 02 Agent 演进: courses/course-02-evolution.md
          - 03 最小 Agent 循环: courses/course-03-minimal-agent-loop.md
          - 04 工具机制: courses/course-04-tool-mechanism.md
          - 05-01 场景增强: courses/course-05-01-scenario-enhancement.md
          - 05-02 RAG: courses/course-05-02-rag.md
          - 05-03 Memory: courses/course-05-03-memory.md
          - 05-04 Context Engineering: courses/course-05-04-context-engineering.md
          - 05-05 Planning: courses/course-05-05-planning.md
          - 05-06 Reflection: courses/course-05-06-reflection.md
          - 05-07 Human-in-the-loop: courses/course-05-07-human-in-the-loop.md
          - 05-08 Multi-agent: courses/course-05-08-multi-agent.md
          - 05-09 能力组合: courses/course-05-09-composition.md
          - 06 运行时架构: courses/course-06-runtime-architecture.md
          - 07 产品化: courses/course-07-productization.md
          - 08 项目实践: courses/course-08-project-practice.md
      - 示例代码:
