site_name: AI Agent Learning Roadmap
site_description: From the minimal agent loop to enhanced capabilities and complete agent systems.
site_url: https://allenzeng.github.io/agent-learning-roadmap/en/

repo_url: https://github.com/AllenZeng/agent-learning-roadmap
repo_name: AllenZeng/agent-learning-roadmap
edit_uri: edit/main/

docs_dir: docs
site_dir: site/en
use_directory_urls: true

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.expand
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.highlight
    - search.suggest
  palette:
    - scheme: default
      primary: black
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

extra:
  alternate:
    - name: 中文
      link: /agent-learning-roadmap/
      lang: zh
    - name: English
      link: /agent-learning-roadmap/en/
      lang: en

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: README.md
  - English Courses:
      - Syllabus: syllabus.md
      - 01 First Encounter: courses-en/course-01-first-encounter.md
      - 02 Evolution: courses-en/course-02-evolution.md
      - 03 Minimal Agent Loop: courses-en/course-03-minimal-agent-loop.md
      - 04 Tool Mechanism: courses-en/course-04-tool-mechanism.md
      - 05-01 Scenario Enhancement: courses-en/course-05-01-scenario-enhancement.md
      - 05-02 RAG: courses-en/course-05-02-rag.md
      - 05-03 Memory: courses-en/course-05-03-memory.md
      - 05-04 Context Engineering: courses-en/course-05-04-context-engineering.md
      - 05-05 Planning: courses-en/course-05-05-planning.md
      - 05-06 Reflection: courses-en/course-05-06-reflection.md
      - 05-07 Human-in-the-loop: courses-en/course-05-07-human-in-the-loop.md
      - 05-08 Multi-agent: courses-en/course-05-08-multi-agent.md
      - 05-09 Composition: courses-en/course-05-09-composition.md
  - Examples:
      - Course 03 Minimal Agent: examples/course-03-minimal-agent/README.md
      - Course 04 Tool Mechanism: examples/course-04-tool-mechanism/README.md
      - Course 05-02 RAG: examples/course-05-02-rag/README.md
      - Course 05-03 Memory: examples/course-05-03-memory/README.md
      - Course 05-04 Context Engineering: examples/course-05-04-context-engineering/README.md
      - Course 05-05 Planning: examples/course-05-05-planning/README.md
      - Course 05-06 Reflection: examples/course-05-06-reflection/README.md
      - Course 05-07 HITL: examples/course-05-07-human-in-the-loop/README.md
      - Course 05-08 Multi-agent: examples/course-05-08-multi-agent/README.md
