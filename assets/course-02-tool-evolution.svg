<svg width="1160" height="1000" viewBox="0 0 1160 1000" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="te-title te-desc">
  <title id="te-title">工具调用四阶段演进</title>
  <desc id="te-desc">工具调用从研究到产品到接口到协议的四个阶段：Toolformer 证明模型可以学会使用工具，ChatGPT Plugins 让用户感知"AI 能做事"，Function Calling 提供工程化接口，MCP 推动工具连接标准化。每一层解决上一层的遗留问题，同时把复杂度推向下一层。</desc>
  <defs>
    <linearGradient id="te-bg" x1="0" y1="0" x2="0" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#F1F5F9"/>
    </linearGradient>
    <filter id="te-shadow" x="-4%" y="-6%" width="108%" height="118%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.06"/>
    </filter>
    <filter id="te-shadow-em" x="-4%" y="-6%" width="108%" height="118%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <marker id="te-arrow-down" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><path d="M0 0L10 3.5L0 7Z" fill="#94A3B8"/></marker>
    <marker id="te-arrow-s2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><path d="M0 0L10 3.5L0 7Z" fill="#2563EB"/></marker>
    <marker id="te-arrow-s3" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><path d="M0 0L10 3.5L0 7Z" fill="#1D4ED8"/></marker>
    <style>
      .te-title { font: 850 34px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #0F172A; }
      .te-sub { font: 430 16px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #64748B; }
      .te-year { font: 800 38px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; }
      .te-month { font: 600 16px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; }
      .te-publisher { font: 520 14px/1.3 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; }
      .te-card-title { font: 820 24px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #0F172A; }
      .te-card-desc { font: 430 14px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #475569; }
      .te-stage-badge { font: 820 13px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; }
      .te-solve-label { font: 750 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #0F766E; }
      .te-solve-text { font: 430 14px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #334155; }
      .te-leave-label { font: 750 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #C2410C; }
      .te-leave-text { font: 430 14px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #64748B; }
      .te-insight-title { font: 760 12px/1.3 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #64748B; }
      .te-insight-body { font: 590 15px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; }
      .te-chain-label { font: 520 12px/1.3 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; }
      .te-footer { font: 430 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #94A3B8; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1160" height="1000" fill="url(#te-bg)"/>

  <!-- Title -->
  <text x="580" y="48" text-anchor="middle" class="te-title">工具调用演进：从研究到产品到接口到协议</text>
  <text x="580" y="76" text-anchor="middle" class="te-sub">每一层都在回答上一层的遗留问题——工具调用不只是"接 API"，而是一套逐渐收敛的工程体系</text>

  <!-- ============================================ -->
  <!-- LEFT TIMELINE RAIL                          -->
  <!-- ============================================ -->
  <!-- Grid: cards at y=140,350,560,770 (h=130); centers at 205,415,625,835 -->
  <line x1="108" y1="195" x2="108" y2="845" stroke="#E2E8F0" stroke-width="2"/>

  <!-- Timeline dots at card centers -->
  <!-- Stage 1 -->
  <circle cx="108" cy="205" r="14" fill="#FFFFFF" stroke="#94A3B8" stroke-width="3"/>
  <circle cx="108" cy="205" r="5" fill="#64748B"/>
  <!-- Stage 2 -->
  <circle cx="108" cy="415" r="14" fill="#FFFFFF" stroke="#60A5FA" stroke-width="3"/>
  <circle cx="108" cy="415" r="5" fill="#2563EB"/>
  <!-- Stage 3 -->
  <circle cx="108" cy="625" r="14" fill="#FFFFFF" stroke="#3B82F6" stroke-width="3"/>
  <circle cx="108" cy="625" r="5" fill="#1D4ED8"/>
  <!-- Stage 4 -->
  <circle cx="108" cy="835" r="16" fill="#FFFFFF" stroke="#34D399" stroke-width="3"/>
  <circle cx="108" cy="835" r="6" fill="#059669"/>

  <!-- ============================================ -->
  <!-- STAGE 1: Toolformer — 研究层  (y=140)        -->
  <!-- ============================================ -->
  <g transform="translate(165 140)" filter="url(#te-shadow)">
    <rect x="0" y="0" width="925" height="130" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>

    <!-- LEFT ZONE: Time + Publisher — FIRST element in reading order -->
    <rect x="0" y="0" width="170" height="130" rx="12" fill="#F8FAFC"/>
    <rect x="12" y="0" width="158" height="130" rx="0" fill="#F8FAFC"/>
    <!-- Year + Month — prominent -->
    <text x="30" y="42" class="te-year" fill="#64748B">2023</text>
    <text x="133" y="42" class="te-month" fill="#94A3B8">.02</text>
    <!-- Publisher -->
    <text x="30" y="66" class="te-publisher" fill="#64748B">Meta AI</text>
    <!-- Phase indicator -->
    <circle cx="30" cy="92" r="4" fill="#94A3B8"/>
    <text x="40" y="96" class="te-chain-label" fill="#94A3B8">研究阶段</text>
    <!-- Divider -->
    <line x1="165" y1="18" x2="165" y2="112" stroke="#E2E8F0" stroke-width="1"/>

    <!-- MAIN CONTENT ZONE -->
    <!-- Stage badge + Title on same line -->
    <rect x="188" y="18" width="64" height="24" rx="6" fill="#F1F5F9"/>
    <text x="220" y="35" text-anchor="middle" class="te-stage-badge" fill="#64748B">研究层</text>
    <text x="265" y="36" class="te-card-title">Toolformer</text>

    <!-- Core question -->
    <text x="188" y="66" class="te-card-desc">核心命题：模型能否把"何时调用 API、调用后如何继续写"学进生成模式？</text>

    <!-- 解决 + 留下 -->
    <text x="188" y="94" class="te-solve-label">✓ 解决</text>
    <text x="246" y="94" class="te-solve-text">自监督训练让模型学会标注 API 调用点——工具使用被证明是可学习的语言模式</text>
    <text x="188" y="115" class="te-leave-label">✗ 留下</text>
    <text x="246" y="115" class="te-leave-text">权限控制、失败处理、工具治理等问题尚未完整纳入研究视野</text>

    <!-- RIGHT: Key insight box -->
    <rect x="768" y="20" width="137" height="90" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <text x="836" y="46" text-anchor="middle" class="te-insight-title">核心洞察</text>
    <text x="836" y="68" text-anchor="middle" class="te-insight-body" fill="#475569">工具使用</text>
    <text x="836" y="90" text-anchor="middle" class="te-insight-body" fill="#475569">也是一种语言模式</text>
  </g>

  <!-- ============================================ -->
  <!-- CONNECTOR 1 → 2  (y=270, h=80)              -->
  <!-- ============================================ -->
  <g transform="translate(165 270)">
    <path d="M460 24C460 54, 460 54, 460 68" stroke="#94A3B8" stroke-width="2" marker-end="url(#te-arrow-down)"/>
    <text x="475" y="50" class="te-chain-label">下一层来解决</text>
  </g>

  <!-- ============================================ -->
  <!-- STAGE 2: ChatGPT Plugins — 产品层 (y=350)    -->
  <!-- ============================================ -->
  <g transform="translate(165 350)" filter="url(#te-shadow-em)">
    <rect x="0" y="0" width="925" height="130" rx="12" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="1.5"/>

    <!-- LEFT ZONE: Time + Publisher -->
    <rect x="0" y="0" width="170" height="130" rx="12" fill="#EFF6FF"/>
    <rect x="12" y="0" width="158" height="130" rx="0" fill="#EFF6FF"/>
    <text x="30" y="42" class="te-year" fill="#2563EB">2023</text>
    <text x="133" y="42" class="te-month" fill="#60A5FA">.03</text>
    <text x="30" y="66" class="te-publisher" fill="#2563EB">OpenAI</text>
    <circle cx="30" cy="92" r="4" fill="#60A5FA"/>
    <text x="40" y="96" class="te-chain-label" fill="#2563EB">产品阶段</text>
    <line x1="165" y1="18" x2="165" y2="112" stroke="#BFDBFE" stroke-width="1"/>

    <!-- MAIN CONTENT -->
    <rect x="188" y="18" width="64" height="24" rx="6" fill="#EFF6FF"/>
    <text x="220" y="35" text-anchor="middle" class="te-stage-badge" fill="#2563EB">产品层</text>
    <text x="265" y="36" class="te-card-title">ChatGPT Plugins</text>

    <text x="188" y="66" class="te-card-desc">核心命题：普通用户如何真正感受到"AI 不只是会回答，而是能做事"？</text>

    <text x="188" y="94" class="te-solve-label">✓ 解决</text>
    <text x="246" y="94" class="te-solve-text">首次将"模型+工具"推向大众体验——安装插件即可让 ChatGPT 操作外部服务</text>
    <text x="188" y="115" class="te-leave-label">✗ 留下</text>
    <text x="246" y="115" class="te-leave-text">暴露了权限边界模糊、用户隐私、供应链安全和越权风险</text>

    <!-- RIGHT: Key insight -->
    <rect x="768" y="20" width="137" height="90" rx="8" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
    <text x="836" y="46" text-anchor="middle" class="te-insight-title">历史意义</text>
    <text x="836" y="68" text-anchor="middle" class="te-insight-body" fill="#2563EB">打破了"LLM 只是</text>
    <text x="836" y="90" text-anchor="middle" class="te-insight-body" fill="#2563EB">聊天工具"的认知</text>
  </g>

  <!-- ============================================ -->
  <!-- CONNECTOR 2 → 3  (y=480, h=80)              -->
  <!-- ============================================ -->
  <g transform="translate(165 480)">
    <path d="M460 24C460 54, 460 54, 460 68" stroke="#2563EB" stroke-width="2" marker-end="url(#te-arrow-s2)"/>
    <text x="475" y="50" class="te-chain-label">下一层来解决</text>
  </g>

  <!-- ============================================ -->
  <!-- STAGE 3: Function Calling — 接口层 (y=560)   -->
  <!-- ============================================ -->
  <g transform="translate(165 560)" filter="url(#te-shadow-em)">
    <rect x="0" y="0" width="925" height="130" rx="12" fill="#FFFFFF" stroke="#2563EB" stroke-width="2"/>

    <!-- LEFT ZONE: Time + Publisher -->
    <rect x="0" y="0" width="170" height="130" rx="12" fill="#DBEAFE"/>
    <rect x="12" y="0" width="158" height="130" rx="0" fill="#DBEAFE"/>
    <text x="30" y="42" class="te-year" fill="#1D4ED8">2023</text>
    <text x="133" y="42" class="te-month" fill="#3B82F6">.06</text>
    <text x="30" y="66" class="te-publisher" fill="#1D4ED8">OpenAI</text>
    <circle cx="30" cy="92" r="4" fill="#3B82F6"/>
    <text x="40" y="96" class="te-chain-label" fill="#1D4ED8">工程阶段</text>
    <line x1="165" y1="18" x2="165" y2="112" stroke="#93C5FD" stroke-width="1"/>

    <!-- MAIN CONTENT -->
    <rect x="188" y="18" width="64" height="24" rx="6" fill="#DBEAFE"/>
    <text x="220" y="35" text-anchor="middle" class="te-stage-badge" fill="#1D4ED8">接口层</text>
    <text x="265" y="36" class="te-card-title">Function Calling</text>

    <text x="188" y="66" class="te-card-desc">核心命题：开发者如何在自己的应用里让模型调用函数、数据库和内部系统？</text>

    <text x="188" y="94" class="te-solve-label">✓ 解决</text>
    <text x="246" y="94" class="te-solve-text">模型不直接执行，只生成结构化调用意图——开发者负责执行和回传结果</text>
    <text x="188" y="115" class="te-leave-label">✗ 留下</text>
    <text x="246" y="115" class="te-leave-text">Schema 设计、重试逻辑、工具可信度、高风险操作确认仍需开发者自行处理</text>

    <!-- RIGHT: Key insight -->
    <rect x="768" y="20" width="137" height="90" rx="8" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
    <text x="836" y="46" text-anchor="middle" class="te-insight-title">核心设计</text>
    <text x="836" y="68" text-anchor="middle" class="te-insight-body" fill="#1D4ED8">模型不直接执行</text>
    <text x="836" y="90" text-anchor="middle" class="te-insight-body" fill="#1D4ED8">只生成调用意图</text>
  </g>

  <!-- ============================================ -->
  <!-- CONNECTOR 3 → 4  (y=690, h=80)              -->
  <!-- ============================================ -->
  <g transform="translate(165 690)">
    <path d="M460 24C460 54, 460 54, 460 68" stroke="#1D4ED8" stroke-width="2" marker-end="url(#te-arrow-s3)"/>
    <text x="475" y="50" class="te-chain-label">下一层来解决</text>
  </g>

  <!-- ============================================ -->
  <!-- STAGE 4: MCP — 协议层  (y=770)              -->
  <!-- ============================================ -->
  <g transform="translate(165 770)" filter="url(#te-shadow-em)">
    <rect x="0" y="0" width="925" height="130" rx="12" fill="#FFFFFF" stroke="#86EFAC" stroke-width="2"/>

    <!-- LEFT ZONE: Time + Publisher -->
    <rect x="0" y="0" width="170" height="130" rx="12" fill="#D1FAE5"/>
    <rect x="12" y="0" width="158" height="130" rx="0" fill="#D1FAE5"/>
    <text x="30" y="42" class="te-year" fill="#059669">2024</text>
    <text x="133" y="42" class="te-month" fill="#34D399">.11</text>
    <text x="30" y="66" class="te-publisher" fill="#059669">Anthropic</text>
    <circle cx="30" cy="92" r="4" fill="#34D399"/>
    <text x="40" y="96" class="te-chain-label" fill="#059669">标准化阶段</text>
    <line x1="165" y1="18" x2="165" y2="112" stroke="#86EFAC" stroke-width="1"/>

    <!-- MAIN CONTENT -->
    <rect x="188" y="18" width="64" height="24" rx="6" fill="#D1FAE5"/>
    <text x="220" y="35" text-anchor="middle" class="te-stage-badge" fill="#059669">协议层</text>
    <text x="265" y="36" class="te-card-title">MCP（Model Context Protocol）</text>

    <text x="188" y="66" class="te-card-desc">核心命题：每个模型、每个应用、每个工具都有不同的连接方式——如何标准化？</text>

    <text x="188" y="94" class="te-solve-label">✓ 解决</text>
    <text x="246" y="94" class="te-solve-text">用开放协议标准化模型与工具的连接，让任意 Agent 都能接入任意工具</text>
    <text x="188" y="115" class="te-leave-label">✗ 留下</text>
    <text x="246" y="115" class="te-leave-text">协议生态仍在早期，覆盖面、安全性模型和治理规范还在建设中</text>

    <!-- RIGHT: Key insight -->
    <rect x="768" y="20" width="137" height="90" rx="8" fill="#D1FAE5" stroke="#86EFAC" stroke-width="1"/>
    <text x="836" y="46" text-anchor="middle" class="te-insight-title">设计灵感</text>
    <text x="836" y="68" text-anchor="middle" class="te-insight-body" fill="#059669">来自 LSP</text>
    <text x="836" y="90" text-anchor="middle" class="te-insight-body" fill="#059669">像编辑器插件一样</text>
  </g>

  <!-- ============================================ -->
  <!-- BOTTOM: Future direction  (y=920)           -->
  <!-- ============================================ -->
  <g transform="translate(165 920)">
    <!-- Dashed line continuing the timeline -->
    <line x1="-57" y1="8" x2="-14" y2="8" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="5,4"/>
    <!-- Future label -->
    <rect x="0" y="-4" width="120" height="24" rx="6" fill="#F1F5F9"/>
    <text x="60" y="12" text-anchor="middle" class="te-chain-label" fill="#64748B">下一阶段：生态与治理</text>
    <path d="M130 8L170 8" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="5,4"/>
  </g>

  <!-- Footer -->
  <text x="580" y="975" text-anchor="middle" class="te-footer">四个阶段，四种抽象层次——工具调用正从"手工作坊"走向"工业标准"，每一步都在回答上一步留下的问题</text>
</svg>
