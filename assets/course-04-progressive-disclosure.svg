<svg width="1200" height="740" viewBox="0 0 1200 740" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">课程四：渐进式披露 — 三层工具信息模型</title>
  <desc id="desc">三层递进式工具信息模型：第一层工具索引（名称+简短描述+风险等级），第二层候选工具定义（完整描述+参数 Schema+边界），第三层深层说明（文档+示例+脚本）。模型判定相关后再展开下一层，节省上下文。</desc>

  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1200" y2="740" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="0.55" stop-color="#ECFEFF"/>
      <stop offset="1" stop-color="#FFF7ED"/>
    </linearGradient>
    <filter id="layerShadow" x="-2%" y="-8%" width="104%" height="124%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.06"/>
    </filter>
    <filter id="softShadow" x="-2%" y="-8%" width="104%" height="124%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.04"/>
    </filter>
    <marker id="arrowExpand" markerWidth="10" markerHeight="8" refX="1" refY="4" orient="auto">
      <polygon points="1,0 9,4 1,8" fill="#0F766E"/>
    </marker>

    <style>
      .title { font: 850 36px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #0F172A; letter-spacing: 0; }
      .subtitle { font: 430 18px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #52616F; letter-spacing: 0; }
      .layerLabel { font: 800 14px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #FFFFFF; letter-spacing: 0; text-anchor: middle; }
      .layerName { font: 820 22px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #0F172A; letter-spacing: 0; }
      .layerDesc { font: 430 14.5px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #475569; letter-spacing: 0; }
      .itemLabel { font: 550 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #334155; letter-spacing: 0; }
      .itemMuted { font: 430 13.5px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #64748B; letter-spacing: 0; }
      .expandLabel { font: 430 14px/1.3 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #0F766E; letter-spacing: 0; text-anchor: middle; }
      .contextBar { font: 430 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #475569; letter-spacing: 0; text-anchor: middle; }
      .footerBold { font: 650 15px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #0F172A; letter-spacing: 0; text-anchor: middle; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="740" fill="url(#page)"/>

  <!-- Title -->
  <text x="600" y="48" text-anchor="middle" class="title">渐进式披露：三层工具信息模型</text>
  <text x="600" y="82" text-anchor="middle" class="subtitle">不要在一开始暴露所有能力细节 — 先给索引，判定相关后再展开</text>

  <!-- Context budget indicator at top right -->
  <g transform="translate(880, 28)" filter="url(#softShadow)">
    <rect x="0" y="0" width="260" height="52" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="130" y="22" text-anchor="middle" class="contextBar" fill="#0F766E" font-weight="700">上下文预算友好</text>
    <text x="130" y="42" text-anchor="middle" class="contextBar">当前轮次只携带相关工具说明</text>
  </g>

  <!-- ============================================================ -->
  <!-- LAYER 3: 深层说明 (shown first/bottom because it's the widest/base) — but I'll go top to bottom in the visual -->
  <!-- Actually let me go Layer 1 (top) → Layer 2 (middle) → Layer 3 (bottom) with expanding width -->
  <!-- ============================================================ -->

  <!-- LAYER 1: 工具索引 -->
  <g transform="translate(260, 110)" filter="url(#layerShadow)">
    <rect x="0" y="0" width="680" height="132" rx="12" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="2"/>
    <!-- top accent -->
    <rect x="0" y="0" width="680" height="5" rx="3" fill="#2563EB"/>
    <!-- header bar -->
    <rect x="0" y="0" width="680" height="50" rx="12" fill="#EFF6FF"/>
    <rect x="0" y="25" width="680" height="25" fill="#EFF6FF"/>
    <!-- layer badge -->
    <rect x="24" y="14" width="80" height="24" rx="12" fill="#2563EB"/>
    <text x="64" y="31" class="layerLabel">第一层</text>
    <text x="120" y="31" class="layerName">工具索引</text>
    <!-- content items - compact list -->
    <text x="28" y="76" class="itemLabel">工具名 + 一句话描述 + 适用场景 + 风险等级</text>
    <!-- visual: compact representation -->
    <g transform="translate(28, 92)">
      <rect x="0" y="0" width="130" height="28" rx="6" fill="#F1F5F9"/>
      <text x="65" y="19" text-anchor="middle" class="itemMuted">read_file</text>
      <rect x="140" y="0" width="130" height="28" rx="6" fill="#F1F5F9"/>
      <text x="205" y="19" text-anchor="middle" class="itemMuted">search_web</text>
      <rect x="280" y="0" width="130" height="28" rx="6" fill="#F1F5F9"/>
      <text x="345" y="19" text-anchor="middle" class="itemMuted">write_file</text>
      <rect x="420" y="0" width="130" height="28" rx="6" fill="#F1F5F9"/>
      <text x="485" y="19" text-anchor="middle" class="itemMuted">run_shell</text>
      <rect x="560" y="0" width="60" height="28" rx="6" fill="#DBEAFE"/>
      <text x="590" y="19" text-anchor="middle" class="itemMuted" fill="#2563EB">More</text>
    </g>
  </g>

  <!-- Expand arrow L1 → L2 -->
  <line x1="600" y1="246" x2="600" y2="270" stroke="#0F766E" stroke-width="2" marker-end="url(#arrowExpand)"/>
  <text x="616" y="262" class="expandLabel" style="text-anchor:start">模型判定相关后，加载具体说明</text>

  <!-- LAYER 2: 候选工具定义 -->
  <g transform="translate(170, 282)" filter="url(#layerShadow)">
    <rect x="0" y="0" width="860" height="148" rx="12" fill="#FFFFFF" stroke="#99F6E4" stroke-width="2"/>
    <rect x="0" y="0" width="860" height="5" rx="3" fill="#0F766E"/>
    <rect x="0" y="0" width="860" height="50" rx="12" fill="#F0FDFA"/>
    <rect x="0" y="25" width="860" height="25" fill="#F0FDFA"/>
    <rect x="24" y="14" width="80" height="24" rx="12" fill="#0F766E"/>
    <text x="64" y="31" class="layerLabel">第二层</text>
    <text x="120" y="31" class="layerName">候选工具定义</text>
    <!-- content -->
    <text x="28" y="76" class="itemLabel">完整 description + 参数 Schema（类型/约束/默认值）+ 使用边界（适用/不适用场景）+ 返回结构</text>
    <!-- visual: expanded tool card -->
    <g transform="translate(28, 90)">
      <rect x="0" y="0" width="804" height="46" rx="6" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
      <text x="16" y="20" class="itemLabel" fill="#0F172A" font-weight="700">read_file</text>
      <text x="110" y="20" class="itemMuted">读取 workspace 下的 UTF-8 文本文件。当用户要求查看、阅读、检查某个文件内容时使用。</text>
      <text x="16" y="38" class="itemMuted">params: path (string, required) — 文件相对于 workspace 的路径 | 边界：只能读取 workspace 目录下的文件</text>
    </g>
  </g>

  <!-- Expand arrow L2 → L3 -->
  <line x1="600" y1="434" x2="600" y2="458" stroke="#0F766E" stroke-width="2" marker-end="url(#arrowExpand)"/>
  <text x="616" y="450" class="expandLabel" style="text-anchor:start">真正要执行时，再读取深层文档、示例或脚本</text>

  <!-- LAYER 3: 深层说明 -->
  <g transform="translate(60, 470)" filter="url(#layerShadow)">
    <rect x="0" y="0" width="1080" height="152" rx="12" fill="#FFFFFF" stroke="#DDD6FE" stroke-width="2"/>
    <rect x="0" y="0" width="1080" height="5" rx="3" fill="#7C3AED"/>
    <rect x="0" y="0" width="1080" height="50" rx="12" fill="#F5F3FF"/>
    <rect x="0" y="25" width="1080" height="25" fill="#F5F3FF"/>
    <rect x="24" y="14" width="80" height="24" rx="12" fill="#7C3AED"/>
    <text x="64" y="31" class="layerLabel">第三层</text>
    <text x="120" y="31" class="layerName">深层说明 / 示例 / 脚本</text>
    <!-- content in three columns -->
    <!-- Col 1: 详细文档 -->
    <g transform="translate(28, 74)">
      <rect x="0" y="0" width="326" height="64" rx="8" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1"/>
      <text x="16" y="24" class="itemLabel" fill="#6D28D9">详细文档</text>
      <text x="16" y="46" class="itemMuted">参数边界条件、已知限制、性能特征</text>
    </g>
    <!-- Col 2: 调用示例 -->
    <g transform="translate(370, 74)">
      <rect x="0" y="0" width="326" height="64" rx="8" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1"/>
      <text x="16" y="24" class="itemLabel" fill="#6D28D9">调用示例</text>
      <text x="16" y="46" class="itemMuted">典型用法、常见错误、正确/错误对比</text>
    </g>
    <!-- Col 3: 领域规则 -->
    <g transform="translate(712, 74)">
      <rect x="0" y="0" width="340" height="64" rx="8" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1"/>
      <text x="16" y="24" class="itemLabel" fill="#6D28D9">领域规则 / 辅助脚本</text>
      <text x="16" y="46" class="itemMuted">业务规则约束、前置检查、后置处理</text>
    </g>
  </g>

  <!-- ============================================================ -->
  <!-- Bottom takeaway -->
  <!-- ============================================================ -->
  <g transform="translate(120, 652)" filter="url(#softShadow)">
    <rect x="0" y="0" width="960" height="56" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="480" y="24" class="footerBold">节省上下文 + 降低干扰：模型只在当前任务相关的工具之间选择，不被无关工具诱导</text>
    <text x="480" y="44" class="contextBar">工具越多、风险越高，越应该使用候选集管理和渐进式披露</text>
  </g>

</svg>
