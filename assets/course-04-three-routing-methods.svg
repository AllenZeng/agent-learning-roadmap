<svg width="1500" height="860" viewBox="0 0 1500 860" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">课程四：三种工具路由方式对比</title>
  <desc id="desc">从左到右对比三种路由方式：模型自主选择、规则路由、混合路由。每种方式展示决策流程、决策权归属、适用场景和代价。</desc>

  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1500" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="0.55" stop-color="#ECFEFF"/>
      <stop offset="1" stop-color="#FFF7ED"/>
    </linearGradient>
    <linearGradient id="spectrumBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="0.5" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <filter id="cardShadow" x="-4%" y="-4%" width="108%" height="112%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <filter id="softShadow" x="-6%" y="-12%" width="112%" height="132%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.06"/>
    </filter>

    <style>
      .title { font: 850 34px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #0F172A; letter-spacing: 0; }
      .subtitle { font: 430 18px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #52616F; letter-spacing: 0; }
      .cardTitle { font: 820 24px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #0F172A; letter-spacing: 0; }
      .cardSubtitle { font: 430 15px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #64748B; letter-spacing: 0; }
      .flowLabel { font: 600 13px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #FFFFFF; letter-spacing: 0; text-anchor: middle; }
      .flowLabelDark { font: 600 13px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #334155; letter-spacing: 0; text-anchor: middle; }
      .sectionTag { font: 760 14px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #0F766E; letter-spacing: 0; }
      .bodyText { font: 430 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #334155; letter-spacing: 0; }
      .badge { font: 760 13px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #FFFFFF; letter-spacing: 0; text-anchor: middle; }
      .spectrumLabel { font: 600 15px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #334155; letter-spacing: 0; }
      .spectrumNote { font: 430 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #64748B; letter-spacing: 0; }
      .connectorLabel { font: 600 14px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #64748B; letter-spacing: 0; text-anchor: middle; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1500" height="860" fill="url(#page)"/>

  <!-- Title -->
  <text x="750" y="56" text-anchor="middle" class="title">三种路由方式：谁来决定用什么工具？</text>

  <!-- ============================================================ -->
  <!-- CARD 1: 模型自主选择 -->
  <!-- ============================================================ -->
  <g transform="translate(40, 130)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="450" height="500" rx="12" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="2"/>

    <!-- Card header area -->
    <rect x="0" y="0" width="450" height="68" rx="12" fill="#EFF6FF"/>
    <rect x="0" y="30" width="450" height="38" fill="#EFF6FF"/>
    <circle cx="48" cy="34" r="20" fill="#2563EB"/>
    <text x="48" y="40" text-anchor="middle" class="badge" font-size="15">1</text>
    <text x="84" y="40" class="cardTitle">模型自主选择</text>

    <!-- Flow diagram area -->
    <text x="30" y="100" class="sectionTag">决策流程</text>

    <!-- Flow box 1: 全部工具 -->
    <rect x="28" y="116" width="80" height="34" rx="6" fill="#0F766E" filter="url(#softShadow)"/>
    <text x="68" y="137" class="flowLabel">全部工具</text>

    <!-- Arrow 1→2 -->
    <text x="116" y="137" class="connectorLabel">→</text>

    <!-- Flow box 2: 模型判断 -->
    <rect x="136" y="116" width="80" height="34" rx="6" fill="#2563EB" filter="url(#softShadow)"/>
    <text x="176" y="137" class="flowLabel">模型判断</text>

    <!-- Arrow 2→3 -->
    <text x="224" y="137" class="connectorLabel">→</text>

    <!-- Flow box 3: 选择工具 -->
    <rect x="244" y="116" width="80" height="34" rx="6" fill="#2563EB" filter="url(#softShadow)"/>
    <text x="284" y="137" class="flowLabel">选择工具</text>

    <!-- Arrow 3→4 -->
    <text x="332" y="137" class="connectorLabel">→</text>

    <!-- Flow box 4: 执行 -->
    <rect x="352" y="116" width="70" height="34" rx="6" fill="#EA580C" filter="url(#softShadow)"/>
    <text x="387" y="137" class="flowLabel">执行</text>

    <!-- Color legend -->
    <rect x="28" y="162" width="10" height="10" rx="2" fill="#0F766E"/>
    <text x="44" y="172" class="spectrumNote">系统提供</text>
    <rect x="118" y="162" width="10" height="10" rx="2" fill="#2563EB"/>
    <text x="134" y="172" class="spectrumNote">模型决策</text>
    <rect x="208" y="162" width="10" height="10" rx="2" fill="#EA580C"/>
    <text x="224" y="172" class="spectrumNote">Runtime 执行</text>

    <line x1="28" y1="192" x2="422" y2="192" stroke="#E2E8F0" stroke-width="1"/>

    <!-- Characteristics -->
    <text x="30" y="220" class="sectionTag">决策权归属</text>
    <circle cx="34" cy="244" r="4" fill="#2563EB"/>
    <text x="46" y="249" class="bodyText">模型拥有完整选择权，看到全部工具后自行判断</text>

    <text x="30" y="284" class="sectionTag">适用场景</text>
    <circle cx="34" cy="308" r="4" fill="#0F766E"/>
    <text x="46" y="313" class="bodyText">工具数量少（&lt; 10 个），工具边界清楚</text>
    <circle cx="34" cy="334" r="4" fill="#0F766E"/>
    <text x="46" y="339" class="bodyText">任务开放、风险低，选错代价可接受</text>
    <circle cx="34" cy="360" r="4" fill="#0F766E"/>
    <text x="46" y="365" class="bodyText">快速原型、学习型 Agent 的早期阶段</text>

    <text x="30" y="404" class="sectionTag">主要代价</text>
    <circle cx="34" cy="426" r="4" fill="#DC2626" opacity="0.7"/>
    <text x="46" y="431" class="bodyText">工具 &gt; 20 个时选择质量明显下降</text>
    <circle cx="34" cy="450" r="4" fill="#DC2626" opacity="0.7"/>
    <text x="46" y="455" class="bodyText">相似工具间边界模糊，模型容易摇摆</text>
    <circle cx="34" cy="474" r="4" fill="#DC2626" opacity="0.7"/>
    <text x="46" y="479" class="bodyText">高风险工具混在一起，缺乏权限分层</text>
  </g>

  <!-- ============================================================ -->
  <!-- CARD 2: 规则路由 -->
  <!-- ============================================================ -->
  <g transform="translate(525, 130)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="450" height="500" rx="12" fill="#FFFFFF" stroke="#99F6E4" stroke-width="2"/>

    <rect x="0" y="0" width="450" height="68" rx="12" fill="#F0FDFA"/>
    <rect x="0" y="30" width="450" height="38" fill="#F0FDFA"/>
    <circle cx="48" cy="34" r="20" fill="#0F766E"/>
    <text x="48" y="40" text-anchor="middle" class="badge" font-size="15">2</text>
    <text x="84" y="40" class="cardTitle">规则路由</text>

    <!-- Flow diagram -->
    <text x="30" y="100" class="sectionTag">决策流程</text>

    <rect x="28" y="116" width="80" height="34" rx="6" fill="#64748B" filter="url(#softShadow)"/>
    <text x="68" y="137" class="flowLabel">用户输入</text>

    <text x="116" y="137" class="connectorLabel">→</text>

    <rect x="136" y="116" width="80" height="34" rx="6" fill="#0F766E" filter="url(#softShadow)"/>
    <text x="176" y="137" class="flowLabel">规则匹配</text>

    <text x="224" y="137" class="connectorLabel">→</text>

    <rect x="244" y="116" width="80" height="34" rx="6" fill="#0F766E" filter="url(#softShadow)"/>
    <text x="284" y="137" class="flowLabel">确定工具</text>

    <text x="332" y="137" class="connectorLabel">→</text>

    <rect x="352" y="116" width="70" height="34" rx="6" fill="#EA580C" filter="url(#softShadow)"/>
    <text x="387" y="137" class="flowLabel">执行</text>

    <rect x="28" y="162" width="10" height="10" rx="2" fill="#64748B"/>
    <text x="44" y="172" class="spectrumNote">触发输入</text>
    <rect x="118" y="162" width="10" height="10" rx="2" fill="#0F766E"/>
    <text x="134" y="172" class="spectrumNote">系统决策</text>
    <rect x="208" y="162" width="10" height="10" rx="2" fill="#EA580C"/>
    <text x="224" y="172" class="spectrumNote">Runtime 执行</text>

    <line x1="28" y1="192" x2="422" y2="192" stroke="#E2E8F0" stroke-width="1"/>

    <text x="30" y="220" class="sectionTag">决策权归属</text>
    <circle cx="34" cy="244" r="4" fill="#0F766E"/>
    <text x="46" y="249" class="bodyText">系统代码决定 — 模型不参与工具选择</text>

    <text x="30" y="284" class="sectionTag">适用场景</text>
    <circle cx="34" cy="308" r="4" fill="#0F766E"/>
    <text x="46" y="313" class="bodyText">流程稳定、可预测，输入-工具映射明确</text>
    <circle cx="34" cy="334" r="4" fill="#0F766E"/>
    <text x="46" y="339" class="bodyText">高风险动作（退款、删除、支付）</text>
    <circle cx="34" cy="360" r="4" fill="#0F766E"/>
    <text x="46" y="365" class="bodyText">必须经过权限和风控检查的链路</text>

    <text x="30" y="404" class="sectionTag">主要代价</text>
    <circle cx="34" cy="426" r="4" fill="#DC2626" opacity="0.7"/>
    <text x="46" y="431" class="bodyText">难以处理开放任务，静态规则覆盖不全</text>
    <circle cx="34" cy="450" r="4" fill="#DC2626" opacity="0.7"/>
    <text x="46" y="455" class="bodyText">新场景需要新增规则，维护成本持续增长</text>
    <circle cx="34" cy="474" r="4" fill="#DC2626" opacity="0.7"/>
    <text x="46" y="479" class="bodyText">规则冲突时优先级和调试变得困难</text>
  </g>

  <!-- ============================================================ -->
  <!-- CARD 3: 混合路由（推荐） -->
  <!-- ============================================================ -->
  <g transform="translate(1010, 130)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="450" height="500" rx="12" fill="#FFFFFF" stroke="#DDD6FE" stroke-width="2"/>

    <!-- Header with badge -->
    <rect x="0" y="0" width="450" height="68" rx="12" fill="#F5F3FF"/>
    <rect x="0" y="30" width="450" height="38" fill="#F5F3FF"/>
    <circle cx="48" cy="34" r="20" fill="#7C3AED"/>
    <text x="48" y="40" text-anchor="middle" class="badge" font-size="15">3</text>
    <text x="84" y="40" class="cardTitle">混合路由</text>
    <!-- 推荐 badge -->
    <rect x="330" y="20" width="88" height="28" rx="14" fill="#7C3AED" filter="url(#softShadow)"/>
    <text x="374" y="39" class="badge" font-size="12">生产首选</text>

    <!-- Flow diagram — single row, two-layer decision shown by color -->
    <text x="30" y="100" class="sectionTag">决策流程</text>

    <rect x="28" y="116" width="74" height="34" rx="6" fill="#0F766E" filter="url(#softShadow)"/>
    <text x="65" y="137" class="flowLabel">全部工具</text>

    <text x="110" y="137" class="connectorLabel">→</text>

    <rect x="124" y="116" width="108" height="34" rx="6" fill="#0F766E" filter="url(#softShadow)"/>
    <text x="178" y="137" class="flowLabel">过滤候选工具集</text>

    <text x="240" y="137" class="connectorLabel">→</text>

    <rect x="254" y="116" width="76" height="34" rx="6" fill="#2563EB" filter="url(#softShadow)"/>
    <text x="292" y="137" class="flowLabel">模型选择</text>

    <text x="338" y="137" class="connectorLabel">→</text>

    <rect x="352" y="116" width="54" height="34" rx="6" fill="#EA580C" filter="url(#softShadow)"/>
    <text x="379" y="137" class="flowLabel">执行</text>

    <!-- Color legend for two-layer decision -->
    <rect x="28" y="164" width="10" height="10" rx="2" fill="#0F766E"/>
    <text x="44" y="174" class="spectrumNote">系统负责边界（规则缩小候选范围）</text>
    <rect x="28" y="182" width="10" height="10" rx="2" fill="#2563EB"/>
    <text x="44" y="192" class="spectrumNote">模型在候选集中精准选择</text>

    <line x1="28" y1="206" x2="422" y2="206" stroke="#E2E8F0" stroke-width="1"/>

    <text x="30" y="238" class="sectionTag">决策权归属</text>
    <circle cx="34" cy="260" r="4" fill="#7C3AED"/>
    <text x="46" y="265" class="bodyText">系统负责边界：当前阶段允许看见哪些工具？</text>
    <circle cx="34" cy="284" r="4" fill="#7C3AED"/>
    <text x="46" y="289" class="bodyText">模型负责判断：候选集中下一步该用哪个？</text>
    <circle cx="34" cy="308" r="4" fill="#7C3AED"/>
    <text x="46" y="313" class="bodyText">Runtime 负责兜底：参数合法？权限通过？</text>

    <text x="30" y="346" class="sectionTag">适用场景</text>
    <circle cx="34" cy="368" r="4" fill="#0F766E"/>
    <text x="46" y="373" class="bodyText">工具较多，需要兼顾灵活和可控</text>
    <circle cx="34" cy="392" r="4" fill="#0F766E"/>
    <text x="46" y="397" class="bodyText">生产环境中混合了低风险和高风险工具</text>
    <circle cx="34" cy="416" r="4" fill="#0F766E"/>
    <text x="46" y="421" class="bodyText">多阶段任务中不同阶段允许不同工具集</text>

    <text x="30" y="452" class="sectionTag">主要代价</text>
    <circle cx="34" cy="472" r="4" fill="#DC2626" opacity="0.7"/>
    <text x="46" y="477" class="bodyText">需要维护工具元数据和路由规则</text>
  </g>

  <!-- ============================================================ -->
  <!-- Bottom: Decision Spectrum -->
  <!-- ============================================================ -->
  <g transform="translate(40, 660)">
    <rect x="0" y="0" width="1420" height="168" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5" filter="url(#cardShadow)"/>

    <text x="710" y="24" text-anchor="middle" class="spectrumLabel" font-size="16" fill="#0F172A">决策权分配：灵活性与可控性的平衡</text>

    <!-- Spectrum bar background -->
    <rect x="160" y="58" width="1100" height="18" rx="9" fill="#F1F5F9"/>

    <!-- Spectrum gradient bar -->
    <rect x="160" y="58" width="1100" height="18" rx="9" fill="url(#spectrumBar)" opacity="0.5"/>

    <!-- Left label -->
    <text x="130" y="72" class="spectrumLabel" text-anchor="end">高灵活性</text>
    <!-- Right label -->
    <text x="1290" y="72" class="spectrumLabel" text-anchor="start">高可控性</text>

    <!-- Marker 1: 模型自主选择 -->
    <line x1="343" y1="48" x2="343" y2="86" stroke="#2563EB" stroke-width="3" stroke-linecap="round"/>
    <circle cx="343" cy="67" r="8" fill="#FFFFFF" stroke="#2563EB" stroke-width="3"/>
    <text x="343" y="42" text-anchor="middle" class="spectrumLabel" fill="#2563EB">方式一</text>
    <text x="343" y="110" text-anchor="middle" class="spectrumNote">模型自主选择</text>
    <text x="343" y="128" text-anchor="middle" class="spectrumNote">工具少，风险低</text>

    <!-- Marker 2: 混合路由 -->
    <line x1="710" y1="48" x2="710" y2="86" stroke="#7C3AED" stroke-width="3" stroke-linecap="round"/>
    <circle cx="710" cy="67" r="8" fill="#FFFFFF" stroke="#7C3AED" stroke-width="3"/>
    <text x="710" y="42" text-anchor="middle" class="spectrumLabel" fill="#7C3AED">方式三</text>
    <text x="710" y="110" text-anchor="middle" class="spectrumNote">混合路由</text>
    <text x="710" y="128" text-anchor="middle" class="spectrumNote">兼顾灵活与可控</text>

    <!-- Marker 3: 规则路由 -->
    <line x1="1077" y1="48" x2="1077" y2="86" stroke="#0F766E" stroke-width="3" stroke-linecap="round"/>
    <circle cx="1077" cy="67" r="8" fill="#FFFFFF" stroke="#0F766E" stroke-width="3"/>
    <text x="1077" y="42" text-anchor="middle" class="spectrumLabel" fill="#0F766E">方式二</text>
    <text x="1077" y="110" text-anchor="middle" class="spectrumNote">规则路由</text>
    <text x="1077" y="128" text-anchor="middle" class="spectrumNote">高风险，流程稳定</text>
  </g>

</svg>
