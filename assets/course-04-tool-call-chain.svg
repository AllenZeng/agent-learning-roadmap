<svg width="1600" height="920" viewBox="0 0 1600 920" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">课程四：工具调用七步链路</title>
  <desc id="desc">图中左侧是工具调用机制的核心圆形区域，右侧向外分散出七条链路分支：模型决策、工具选择、参数生成、权限检查、工具执行、观察回填和状态更新。每个分支说明该环节的主要功能与容易出现的问题。</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1600" y2="920" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="0.55" stop-color="#ECFEFF"/>
      <stop offset="1" stop-color="#FFF7ED"/>
    </linearGradient>
    <linearGradient id="core" x1="104" y1="292" x2="470" y2="658" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F766E"/>
      <stop offset="0.58" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#EA580C"/>
    </linearGradient>
    <linearGradient id="branch" x1="454" y1="456" x2="610" y2="456" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#94A3B8"/>
    </linearGradient>
    <filter id="softShadow" x="-6%" y="-12%" width="112%" height="132%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <style>
      .title { font: 850 42px/1.15 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #102A43; letter-spacing: 0; }
      .subtitle { font: 430 20px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #52616F; letter-spacing: 0; }
      .coreTitle { font: 850 38px/1.18 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #FFFFFF; letter-spacing: 0; }
      .coreNote { font: 500 20px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #E0F2FE; letter-spacing: 0; }
      .stepNo { font: 850 16px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #FFFFFF; letter-spacing: 0; }
      .stepTitle { font: 820 25px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #0F172A; letter-spacing: 0; }
      .stepMeta { font: 760 15px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #0F766E; letter-spacing: 0; }
      .stepText { font: 430 17px/1.42 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #334155; letter-spacing: 0; }
      .funcFlow { font: 500 15px/18px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; color: #334155; letter-spacing: 0; margin: 0; overflow-wrap: break-word; }
      .riskMeta { font: 760 15px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #C2410C; letter-spacing: 0; }
      .riskFlow { font: 500 14px/17px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif; color: #7C2D12; letter-spacing: 0; margin: 0; overflow-wrap: break-word; }
    </style>
  </defs>

  <rect width="1600" height="920" fill="url(#page)"/>
  <text x="800" y="62" text-anchor="middle" class="title">工具调用不是一次 API 请求，而是一条七步运行链路</text>
  <text x="800" y="102" text-anchor="middle" class="subtitle">模型只生成调用意图；真正让工具可选、可执行、可控、可追溯的是 Runtime 链路。</text>

  <g filter="url(#softShadow)">
    <circle cx="286" cy="476" r="186" fill="url(#core)"/>
    <circle cx="286" cy="476" r="160" fill="none" stroke="#FFFFFF" stroke-opacity="0.38" stroke-width="2"/>
    <text x="286" y="438" text-anchor="middle" class="coreTitle">工具调用</text>
    <text x="286" y="486" text-anchor="middle" class="coreTitle">链路</text>
    <text x="286" y="536" text-anchor="middle" class="coreNote">从“想调用”到“结果进入下一轮”</text>
    <text x="286" y="568" text-anchor="middle" class="coreNote">每一步都需要机制兜底</text>
  </g>

  <path d="M454 476C505 268 540 189 610 174" stroke="url(#branch)" stroke-width="4" stroke-linecap="round"/>
  <path d="M454 476C514 326 548 289 610 282" stroke="url(#branch)" stroke-width="4" stroke-linecap="round"/>
  <path d="M454 476C520 399 555 395 610 390" stroke="url(#branch)" stroke-width="4" stroke-linecap="round"/>
  <path d="M454 476C506 492 548 498 610 498" stroke="url(#branch)" stroke-width="4" stroke-linecap="round"/>
  <path d="M454 476C520 569 555 601 610 606" stroke="url(#branch)" stroke-width="4" stroke-linecap="round"/>
  <path d="M454 476C514 642 548 707 610 714" stroke="url(#branch)" stroke-width="4" stroke-linecap="round"/>
  <path d="M454 476C505 700 540 807 610 822" stroke="url(#branch)" stroke-width="4" stroke-linecap="round"/>

  <g transform="translate(610 130)" filter="url(#softShadow)">
    <rect x="0" y="0" width="850" height="88" rx="10" fill="#FFFFFF" stroke="#BAE6FD" stroke-width="2"/>
    <circle cx="44" cy="44" r="22" fill="#2563EB"/>
    <text x="44" y="50" text-anchor="middle" class="stepNo">01</text>
    <text x="82" y="35" class="stepTitle">LLM Decision</text>
    <text x="82" y="63" class="stepText">判断是否需要外部能力</text>
    <text x="410" y="33" class="stepMeta">主要功能</text>
    <foreignObject x="410" y="44" width="190" height="40">
      <div xmlns="http://www.w3.org/1999/xhtml" class="funcFlow">把用户目标转成调用意图</div>
    </foreignObject>
    <text x="630" y="33" class="riskMeta">容易出现的问题</text>
    <foreignObject x="630" y="44" width="192" height="40">
      <div xmlns="http://www.w3.org/1999/xhtml" class="riskFlow">需要工具时没用；没必要时乱用</div>
    </foreignObject>
  </g>

  <g transform="translate(610 238)" filter="url(#softShadow)">
    <rect x="0" y="0" width="850" height="88" rx="10" fill="#FFFFFF" stroke="#99F6E4" stroke-width="2"/>
    <circle cx="44" cy="44" r="22" fill="#0F766E"/>
    <text x="44" y="50" text-anchor="middle" class="stepNo">02</text>
    <text x="82" y="35" class="stepTitle">Tool Selection</text>
    <text x="82" y="63" class="stepText">从工具列表中选具体工具</text>
    <text x="410" y="33" class="stepMeta">主要功能</text>
    <foreignObject x="410" y="44" width="190" height="40">
      <div xmlns="http://www.w3.org/1999/xhtml" class="funcFlow">匹配任务、边界和工具能力</div>
    </foreignObject>
    <text x="630" y="33" class="riskMeta">容易出现的问题</text>
    <foreignObject x="630" y="44" width="192" height="40">
      <div xmlns="http://www.w3.org/1999/xhtml" class="riskFlow">选错工具；漏掉更合适的工具</div>
    </foreignObject>
  </g>

  <g transform="translate(610 346)" filter="url(#softShadow)">
    <rect x="0" y="0" width="850" height="88" rx="10" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="2"/>
    <circle cx="44" cy="44" r="22" fill="#0284C7"/>
    <text x="44" y="50" text-anchor="middle" class="stepNo">03</text>
    <text x="82" y="35" class="stepTitle">Parameter Generation</text>
    <text x="82" y="63" class="stepText">生成工具参数</text>
    <text x="410" y="33" class="stepMeta">主要功能</text>
    <foreignObject x="410" y="44" width="190" height="40">
      <div xmlns="http://www.w3.org/1999/xhtml" class="funcFlow">填充类型、对象、必填字段</div>
    </foreignObject>
    <text x="630" y="33" class="riskMeta">容易出现的问题</text>
    <foreignObject x="630" y="44" width="192" height="40">
      <div xmlns="http://www.w3.org/1999/xhtml" class="riskFlow">参数类型不对；编造对象；漏填字段</div>
    </foreignObject>
  </g>

  <g transform="translate(610 454)" filter="url(#softShadow)">
    <rect x="0" y="0" width="850" height="88" rx="10" fill="#FFFFFF" stroke="#FDE68A" stroke-width="2"/>
    <circle cx="44" cy="44" r="22" fill="#CA8A04"/>
    <text x="44" y="50" text-anchor="middle" class="stepNo">04</text>
    <text x="82" y="35" class="stepTitle">Permission Check</text>
    <text x="82" y="63" class="stepText">Runtime 判断是否允许执行</text>
    <text x="410" y="33" class="stepMeta">主要功能</text>
    <foreignObject x="410" y="44" width="190" height="40">
      <div xmlns="http://www.w3.org/1999/xhtml" class="funcFlow">拦住越界、高风险和未授权动作</div>
    </foreignObject>
    <text x="630" y="33" class="riskMeta">容易出现的问题</text>
    <foreignObject x="630" y="44" width="192" height="40">
      <div xmlns="http://www.w3.org/1999/xhtml" class="riskFlow">越权执行；误操作；影响真实世界</div>
    </foreignObject>
  </g>

  <g transform="translate(610 562)" filter="url(#softShadow)">
    <rect x="0" y="0" width="850" height="88" rx="10" fill="#FFFFFF" stroke="#FDBA74" stroke-width="2"/>
    <circle cx="44" cy="44" r="22" fill="#EA580C"/>
    <text x="44" y="50" text-anchor="middle" class="stepNo">05</text>
    <text x="82" y="35" class="stepTitle">Tool Execution</text>
    <text x="82" y="63" class="stepText">Runtime 真正执行工具</text>
    <text x="410" y="33" class="stepMeta">主要功能</text>
    <foreignObject x="410" y="44" width="190" height="40">
      <div xmlns="http://www.w3.org/1999/xhtml" class="funcFlow">调用外部系统并处理执行过程</div>
    </foreignObject>
    <text x="630" y="33" class="riskMeta">容易出现的问题</text>
    <foreignObject x="630" y="44" width="192" height="40">
      <div xmlns="http://www.w3.org/1999/xhtml" class="riskFlow">调用超时；执行异常；服务不可用</div>
    </foreignObject>
  </g>

  <g transform="translate(610 670)" filter="url(#softShadow)">
    <rect x="0" y="0" width="850" height="88" rx="10" fill="#FFFFFF" stroke="#C4B5FD" stroke-width="2"/>
    <circle cx="44" cy="44" r="22" fill="#7C3AED"/>
    <text x="44" y="50" text-anchor="middle" class="stepNo">06</text>
    <text x="82" y="35" class="stepTitle">Observation / Feedback</text>
    <text x="82" y="63" class="stepText">整理结果，回填给模型</text>
    <text x="410" y="33" class="stepMeta">主要功能</text>
    <foreignObject x="410" y="44" width="190" height="40">
      <div xmlns="http://www.w3.org/1999/xhtml" class="funcFlow">把原始结果压成可决策信息</div>
    </foreignObject>
    <text x="630" y="33" class="riskMeta">容易出现的问题</text>
    <foreignObject x="630" y="44" width="192" height="40">
      <div xmlns="http://www.w3.org/1999/xhtml" class="riskFlow">结果太长；错误原因说不清</div>
    </foreignObject>
  </g>

  <g transform="translate(610 778)" filter="url(#softShadow)">
    <rect x="0" y="0" width="850" height="88" rx="10" fill="#FFFFFF" stroke="#FDA4AF" stroke-width="2"/>
    <circle cx="44" cy="44" r="22" fill="#E11D48"/>
    <text x="44" y="50" text-anchor="middle" class="stepNo">07</text>
    <text x="82" y="35" class="stepTitle">State Update</text>
    <text x="82" y="63" class="stepText">写入任务状态，供下一轮读取</text>
    <text x="410" y="33" class="stepMeta">主要功能</text>
    <foreignObject x="410" y="44" width="190" height="40">
      <div xmlns="http://www.w3.org/1999/xhtml" class="funcFlow">沉淀历史、结果、错误和 Trace</div>
    </foreignObject>
    <text x="630" y="33" class="riskMeta">容易出现的问题</text>
    <foreignObject x="630" y="44" width="192" height="40">
      <div xmlns="http://www.w3.org/1999/xhtml" class="riskFlow">状态丢失；问题无法复盘</div>
    </foreignObject>
  </g>
</svg>
