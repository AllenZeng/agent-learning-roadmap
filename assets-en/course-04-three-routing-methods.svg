<svg width="1500" height="860" viewBox="0 0 1500 860" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Lesson 4: Comparing Three Tool Routing Strategies</title>
  <desc id="desc">A left-to-right comparison of three routing strategies: model self-selection, rule routing, and hybrid routing, including flow, decision ownership, use cases, and costs.</desc>

  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1500" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="0.55" stop-color="#ECFEFF"/>
      <stop offset="1" stop-color="#FFF7ED"/>
    </linearGradient>
    <linearGradient id="spectrumBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="0.5" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <filter id="cardShadow" x="-4%" y="-4%" width="108%" height="112%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <filter id="softShadow" x="-6%" y="-12%" width="112%" height="132%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.06"/>
    </filter>

    <style>
      .title { font: 850 32px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0F172A; letter-spacing: 0; }
      .subtitle { font: 430 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #52616F; letter-spacing: 0; }
      .cardTitle { font: 820 21px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0F172A; letter-spacing: 0; }
      .cardSubtitle { font: 430 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748B; letter-spacing: 0; }
      .flowLabel { font: 600 11px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #FFFFFF; letter-spacing: 0; text-anchor: middle; }
      .flowLabelDark { font: 600 11px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; letter-spacing: 0; text-anchor: middle; }
      .sectionTag { font: 760 14px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0F766E; letter-spacing: 0; }
      .bodyText { font: 430 12.5px/1.42 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; letter-spacing: 0; }
      .badge { font: 760 13px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #FFFFFF; letter-spacing: 0; text-anchor: middle; }
      .spectrumLabel { font: 600 15px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; letter-spacing: 0; }
      .spectrumNote { font: 430 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748B; letter-spacing: 0; }
      .connectorLabel { font: 600 12px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748B; letter-spacing: 0; text-anchor: middle; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1500" height="860" fill="url(#page)"/>

  <!-- Title -->
  <text x="750" y="56" text-anchor="middle" class="title">Three Routing Strategies: Who Decides Which Tool to Use?</text>

  <!-- ============================================================ -->
  <!-- CARD 1: Model Self-Selection -->
  <!-- ============================================================ -->
  <g transform="translate(40, 130)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="450" height="500" rx="12" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="2"/>

    <!-- Card header area -->
    <rect x="0" y="0" width="450" height="68" rx="12" fill="#EFF6FF"/>
    <rect x="0" y="30" width="450" height="38" fill="#EFF6FF"/>
    <circle cx="48" cy="34" r="20" fill="#2563EB"/>
    <text x="48" y="40" text-anchor="middle" class="badge" font-size="15">1</text>
    <text x="84" y="40" class="cardTitle">Model Self-Selection</text>

    <!-- Flow diagram area -->
    <text x="30" y="100" class="sectionTag">Decision flow</text>

    <!-- Flow box 1: All tools -->
    <rect x="28" y="116" width="80" height="34" rx="6" fill="#0F766E" filter="url(#softShadow)"/>
    <text x="68" y="137" class="flowLabel">All tools</text>

    <!-- Arrow 1→2 -->
    <text x="116" y="137" class="connectorLabel">→</text>

    <!-- Flow box 2: Model judges -->
    <rect x="136" y="116" width="80" height="34" rx="6" fill="#2563EB" filter="url(#softShadow)"/>
    <text x="176" y="137" class="flowLabel">Model judges</text>

    <!-- Arrow 2→3 -->
    <text x="224" y="137" class="connectorLabel">→</text>

    <!-- Flow box 3: Select tool -->
    <rect x="244" y="116" width="80" height="34" rx="6" fill="#2563EB" filter="url(#softShadow)"/>
    <text x="284" y="137" class="flowLabel">Select tool</text>

    <!-- Arrow 3→4 -->
    <text x="332" y="137" class="connectorLabel">→</text>

    <!-- Flow box 4: Execute -->
    <rect x="352" y="116" width="70" height="34" rx="6" fill="#EA580C" filter="url(#softShadow)"/>
    <text x="387" y="137" class="flowLabel">Execute</text>

    <!-- Color legend -->
    <rect x="28" y="162" width="10" height="10" rx="2" fill="#0F766E"/>
    <text x="44" y="172" class="spectrumNote">System</text>
    <rect x="118" y="162" width="10" height="10" rx="2" fill="#2563EB"/>
    <text x="134" y="172" class="spectrumNote">Model</text>
    <rect x="208" y="162" width="10" height="10" rx="2" fill="#EA580C"/>
    <text x="224" y="172" class="spectrumNote">Runtime</text>

    <line x1="28" y1="192" x2="422" y2="192" stroke="#E2E8F0" stroke-width="1"/>

    <!-- Characteristics -->
    <text x="30" y="220" class="sectionTag">Decision ownership</text>
    <circle cx="34" cy="244" r="4" fill="#2563EB"/>
    <text x="46" y="249" class="bodyText">The model has full choice and judges after seeing all tools</text>

    <text x="30" y="284" class="sectionTag">Use cases</text>
    <circle cx="34" cy="308" r="4" fill="#0F766E"/>
    <text x="46" y="313" class="bodyText">Few tools (&lt; 10), with clear boundaries</text>
    <circle cx="34" cy="334" r="4" fill="#0F766E"/>
    <text x="46" y="339" class="bodyText">Open-ended, low-risk tasks where wrong choices are acceptable</text>
    <circle cx="34" cy="360" r="4" fill="#0F766E"/>
    <text x="46" y="365" class="bodyText">Early stage of prototypes and learning Agents</text>

    <text x="30" y="404" class="sectionTag">Main costs</text>
    <circle cx="34" cy="426" r="4" fill="#DC2626" opacity="0.7"/>
    <text x="46" y="431" class="bodyText">Selection quality drops when tools &gt; 20</text>
    <circle cx="34" cy="450" r="4" fill="#DC2626" opacity="0.7"/>
    <text x="46" y="455" class="bodyText">Similar tools cause ambiguity and hesitation</text>
    <circle cx="34" cy="474" r="4" fill="#DC2626" opacity="0.7"/>
    <text x="46" y="479" class="bodyText">High-risk tools mix with others without permission layers</text>
  </g>

  <!-- ============================================================ -->
  <!-- CARD 2: Rule Routing -->
  <!-- ============================================================ -->
  <g transform="translate(525, 130)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="450" height="500" rx="12" fill="#FFFFFF" stroke="#99F6E4" stroke-width="2"/>

    <rect x="0" y="0" width="450" height="68" rx="12" fill="#F0FDFA"/>
    <rect x="0" y="30" width="450" height="38" fill="#F0FDFA"/>
    <circle cx="48" cy="34" r="20" fill="#0F766E"/>
    <text x="48" y="40" text-anchor="middle" class="badge" font-size="15">2</text>
    <text x="84" y="40" class="cardTitle">Rule Routing</text>

    <!-- Flow diagram -->
    <text x="30" y="100" class="sectionTag">Decision flow</text>

    <rect x="28" y="116" width="80" height="34" rx="6" fill="#64748B" filter="url(#softShadow)"/>
    <text x="68" y="137" class="flowLabel">User input</text>

    <text x="116" y="137" class="connectorLabel">→</text>

    <rect x="136" y="116" width="80" height="34" rx="6" fill="#0F766E" filter="url(#softShadow)"/>
    <text x="176" y="137" class="flowLabel">Rule match</text>

    <text x="224" y="137" class="connectorLabel">→</text>

    <rect x="244" y="116" width="80" height="34" rx="6" fill="#0F766E" filter="url(#softShadow)"/>
    <text x="284" y="137" class="flowLabel">Fixed tool</text>

    <text x="332" y="137" class="connectorLabel">→</text>

    <rect x="352" y="116" width="70" height="34" rx="6" fill="#EA580C" filter="url(#softShadow)"/>
    <text x="387" y="137" class="flowLabel">Execute</text>

    <rect x="28" y="162" width="10" height="10" rx="2" fill="#64748B"/>
    <text x="44" y="172" class="spectrumNote">Input</text>
    <rect x="118" y="162" width="10" height="10" rx="2" fill="#0F766E"/>
    <text x="134" y="172" class="spectrumNote">System</text>
    <rect x="208" y="162" width="10" height="10" rx="2" fill="#EA580C"/>
    <text x="224" y="172" class="spectrumNote">Runtime</text>

    <line x1="28" y1="192" x2="422" y2="192" stroke="#E2E8F0" stroke-width="1"/>

    <text x="30" y="220" class="sectionTag">Decision ownership</text>
    <circle cx="34" cy="244" r="4" fill="#0F766E"/>
    <text x="46" y="249" class="bodyText">System code decides; the model does not choose tools</text>

    <text x="30" y="284" class="sectionTag">Use cases</text>
    <circle cx="34" cy="308" r="4" fill="#0F766E"/>
    <text x="46" y="313" class="bodyText">Stable, predictable flows with clear input-tool mapping</text>
    <circle cx="34" cy="334" r="4" fill="#0F766E"/>
    <text x="46" y="339" class="bodyText">High-risk actions such as refunds, deletion, payment</text>
    <circle cx="34" cy="360" r="4" fill="#0F766E"/>
    <text x="46" y="365" class="bodyText">Flows requiring permission and risk checks</text>

    <text x="30" y="404" class="sectionTag">Main costs</text>
    <circle cx="34" cy="426" r="4" fill="#DC2626" opacity="0.7"/>
    <text x="46" y="431" class="bodyText">Open tasks are hard; static rules cannot cover everything</text>
    <circle cx="34" cy="450" r="4" fill="#DC2626" opacity="0.7"/>
    <text x="46" y="455" class="bodyText">New cases need new rules, so maintenance grows</text>
    <circle cx="34" cy="474" r="4" fill="#DC2626" opacity="0.7"/>
    <text x="46" y="479" class="bodyText">Priority and debugging get hard when rules conflict</text>
  </g>

  <!-- ============================================================ -->
  <!-- CARD 3: Hybrid Routing (recommended) -->
  <!-- ============================================================ -->
  <g transform="translate(1010, 130)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="450" height="500" rx="12" fill="#FFFFFF" stroke="#DDD6FE" stroke-width="2"/>

    <!-- Header with badge -->
    <rect x="0" y="0" width="450" height="68" rx="12" fill="#F5F3FF"/>
    <rect x="0" y="30" width="450" height="38" fill="#F5F3FF"/>
    <circle cx="48" cy="34" r="20" fill="#7C3AED"/>
    <text x="48" y="40" text-anchor="middle" class="badge" font-size="15">3</text>
    <text x="84" y="40" class="cardTitle">Hybrid Routing</text>
    <!-- Recommended badge -->
    <rect x="292" y="20" width="132" height="28" rx="14" fill="#7C3AED" filter="url(#softShadow)"/>
    <text x="358" y="39" class="badge" font-size="12">Production default</text>

    <!-- Flow diagram — single row, two-layer decision shown by color -->
    <text x="30" y="100" class="sectionTag">Decision flow</text>

    <rect x="28" y="116" width="74" height="34" rx="6" fill="#0F766E" filter="url(#softShadow)"/>
    <text x="65" y="137" class="flowLabel">All tools</text>

    <text x="110" y="137" class="connectorLabel">→</text>

    <rect x="124" y="116" width="108" height="34" rx="6" fill="#0F766E" filter="url(#softShadow)"/>
    <text x="178" y="137" class="flowLabel">Filter candidate set</text>

    <text x="240" y="137" class="connectorLabel">→</text>

    <rect x="254" y="116" width="76" height="34" rx="6" fill="#2563EB" filter="url(#softShadow)"/>
    <text x="292" y="137" class="flowLabel">Model selects</text>

    <text x="338" y="137" class="connectorLabel">→</text>

    <rect x="352" y="116" width="54" height="34" rx="6" fill="#EA580C" filter="url(#softShadow)"/>
    <text x="379" y="137" class="flowLabel">Execute</text>

    <!-- Color legend for two-layer decision -->
    <rect x="28" y="164" width="10" height="10" rx="2" fill="#0F766E"/>
    <text x="44" y="174" class="spectrumNote">System sets boundaries by narrowing candidates</text>
    <rect x="28" y="182" width="10" height="10" rx="2" fill="#2563EB"/>
    <text x="44" y="192" class="spectrumNote">Model selects precisely within candidates</text>

    <line x1="28" y1="206" x2="422" y2="206" stroke="#E2E8F0" stroke-width="1"/>

    <text x="30" y="238" class="sectionTag">Decision ownership</text>
    <circle cx="34" cy="260" r="4" fill="#7C3AED"/>
    <text x="46" y="265" class="bodyText">System owns boundaries: which tools are visible now?</text>
    <circle cx="34" cy="284" r="4" fill="#7C3AED"/>
    <text x="46" y="289" class="bodyText">Model owns judgment: which candidate is next?</text>
    <circle cx="34" cy="308" r="4" fill="#7C3AED"/>
    <text x="46" y="313" class="bodyText">Runtime backstops: valid params? permission passed?</text>

    <text x="30" y="346" class="sectionTag">Use cases</text>
    <circle cx="34" cy="368" r="4" fill="#0F766E"/>
    <text x="46" y="373" class="bodyText">Many tools, requiring both flexibility and control</text>
    <circle cx="34" cy="392" r="4" fill="#0F766E"/>
    <text x="46" y="397" class="bodyText">Production environments mixing low- and high-risk tools</text>
    <circle cx="34" cy="416" r="4" fill="#0F766E"/>
    <text x="46" y="421" class="bodyText">Multi-stage tasks with different tool sets by phase</text>

    <text x="30" y="452" class="sectionTag">Main costs</text>
    <circle cx="34" cy="472" r="4" fill="#DC2626" opacity="0.7"/>
    <text x="46" y="477" class="bodyText">Requires tool metadata and routing rules</text>
  </g>

  <!-- ============================================================ -->
  <!-- Bottom: Decision Spectrum -->
  <!-- ============================================================ -->
  <g transform="translate(40, 660)">
    <rect x="0" y="0" width="1420" height="168" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5" filter="url(#cardShadow)"/>

    <text x="710" y="24" text-anchor="middle" class="spectrumLabel" font-size="16" fill="#0F172A">Decision ownership balances flexibility and control</text>

    <!-- Spectrum bar background -->
    <rect x="160" y="58" width="1100" height="18" rx="9" fill="#F1F5F9"/>

    <!-- Spectrum gradient bar -->
    <rect x="160" y="58" width="1100" height="18" rx="9" fill="url(#spectrumBar)" opacity="0.5"/>

    <!-- Left label -->
    <text x="130" y="72" class="spectrumLabel" text-anchor="end">High flexibility</text>
    <!-- Right label -->
    <text x="1290" y="72" class="spectrumLabel" text-anchor="start">High control</text>

    <!-- Marker 1: Model Self-Selection -->
    <line x1="343" y1="48" x2="343" y2="86" stroke="#2563EB" stroke-width="3" stroke-linecap="round"/>
    <circle cx="343" cy="67" r="8" fill="#FFFFFF" stroke="#2563EB" stroke-width="3"/>
    <text x="343" y="42" text-anchor="middle" class="spectrumLabel" fill="#2563EB">Strategy 1</text>
    <text x="343" y="110" text-anchor="middle" class="spectrumNote">Model Self-Selection</text>
    <text x="343" y="128" text-anchor="middle" class="spectrumNote">Few tools, low risk</text>

    <!-- Marker 2: Hybrid Routing -->
    <line x1="710" y1="48" x2="710" y2="86" stroke="#7C3AED" stroke-width="3" stroke-linecap="round"/>
    <circle cx="710" cy="67" r="8" fill="#FFFFFF" stroke="#7C3AED" stroke-width="3"/>
    <text x="710" y="42" text-anchor="middle" class="spectrumLabel" fill="#7C3AED">Strategy 3</text>
    <text x="710" y="110" text-anchor="middle" class="spectrumNote">Hybrid Routing</text>
    <text x="710" y="128" text-anchor="middle" class="spectrumNote">Flexible and controlled</text>

    <!-- Marker 3: Rule Routing -->
    <line x1="1077" y1="48" x2="1077" y2="86" stroke="#0F766E" stroke-width="3" stroke-linecap="round"/>
    <circle cx="1077" cy="67" r="8" fill="#FFFFFF" stroke="#0F766E" stroke-width="3"/>
    <text x="1077" y="42" text-anchor="middle" class="spectrumLabel" fill="#0F766E">Strategy 2</text>
    <text x="1077" y="110" text-anchor="middle" class="spectrumNote">Rule Routing</text>
    <text x="1077" y="128" text-anchor="middle" class="spectrumNote">High risk, stable flow</text>
  </g>

</svg>
