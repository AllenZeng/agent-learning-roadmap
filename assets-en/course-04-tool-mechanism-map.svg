<svg width="1400" height="980" viewBox="0 0 1400 980" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Lesson 4: Tool Mechanism</title>
  <desc id="desc">The center is the Agent tool-system mechanism. Five numbered functions radiate clockwise: tool definition, tool selection, execution and feedback, permission and safety, and human in the loop.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1400" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="0.55" stop-color="#ECFEFF"/>
      <stop offset="1" stop-color="#FFF7ED"/>
    </linearGradient>
    <linearGradient id="core" x1="560" y1="350" x2="840" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F766E"/>
      <stop offset="0.58" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#EA580C"/>
    </linearGradient>
    <linearGradient id="line" x1="300" y1="160" x2="1100" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#94A3B8"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-14%" width="116%" height="134%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <style>
      .coreTitle { font: 850 35px/1.18 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #FFFFFF; letter-spacing: 0; }
      .chapter { font: 850 17px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #FFFFFF; letter-spacing: 0; }
      .cardTitle { font: 820 24px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0F172A; letter-spacing: 0; }
      .tag { font: 760 14px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0F766E; letter-spacing: 0; }
      .cardText { font: 430 15.5px/1.38 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; letter-spacing: 0; }
    </style>
  </defs>

  <rect width="1400" height="980" fill="url(#page)"/>

  <path d="M700 490C700 370 700 302 700 238" stroke="url(#line)" stroke-width="4" stroke-linecap="round"/>
  <path d="M700 490C585 415 475 350 335 315" stroke="url(#line)" stroke-width="4" stroke-linecap="round"/>
  <path d="M700 490C815 415 925 350 1065 315" stroke="url(#line)" stroke-width="4" stroke-linecap="round"/>
  <path d="M700 490C585 565 475 630 335 665" stroke="url(#line)" stroke-width="4" stroke-linecap="round"/>
  <path d="M700 490C815 565 925 630 1065 665" stroke="url(#line)" stroke-width="4" stroke-linecap="round"/>

  <g transform="translate(500 90)" filter="url(#shadow)">
    <rect width="400" height="166" rx="10" fill="#FFFFFF" stroke="#99F6E4" stroke-width="2"/>
    <rect x="28" y="26" width="58" height="34" rx="17" fill="#0F766E"/>
    <text x="57" y="49" text-anchor="middle" class="chapter">01</text>
    <text x="106" y="51" class="cardTitle">Tool Definition</text>
    <text x="30" y="90" class="tag">Make the model know what the tool is</text>
    <text x="30" y="112" class="cardText">Name, description, parameter schema,</text>
    <text x="30" y="136" class="cardText">returns, and boundaries determine whether</text>
    <text x="30" y="160" class="cardText">the model can use the tool correctly.</text>
  </g>

  <g transform="translate(80 300)" filter="url(#shadow)">
    <rect width="410" height="166" rx="10" fill="#FFFFFF" stroke="#FDA4AF" stroke-width="2"/>
    <rect x="28" y="26" width="58" height="34" rx="17" fill="#E11D48"/>
    <text x="57" y="49" text-anchor="middle" class="chapter">05</text>
    <text x="106" y="51" class="cardTitle">Human in the loop</text>
    <text x="30" y="90" class="tag">Bring humans into high-risk decisions</text>
    <text x="30" y="112" class="cardText">In authorization, confirmation, correction,</text>
    <text x="30" y="136" class="cardText">and feedback loops, include humans</text>
    <text x="30" y="160" class="cardText">in the runtime control plane.</text>
  </g>

  <g transform="translate(910 300)" filter="url(#shadow)">
    <rect width="410" height="166" rx="10" fill="#FFFFFF" stroke="#BAE6FD" stroke-width="2"/>
    <rect x="28" y="26" width="58" height="34" rx="17" fill="#2563EB"/>
    <text x="57" y="49" text-anchor="middle" class="chapter">02</text>
    <text x="106" y="51" class="cardTitle">Tool Selection</text>
    <text x="30" y="90" class="tag">Let the model know when to use which tool</text>
    <text x="30" y="112" class="cardText">Candidate sets, routing strategy,</text>
    <text x="30" y="136" class="cardText">and failure diagnosis prevent missed,</text>
    <text x="30" y="160" class="cardText">excessive, or wrong tool use.</text>
  </g>

  <g transform="translate(80 665)" filter="url(#shadow)">
    <rect width="410" height="166" rx="10" fill="#FFFFFF" stroke="#FDE68A" stroke-width="2"/>
    <rect x="28" y="26" width="58" height="34" rx="17" fill="#CA8A04"/>
    <text x="57" y="49" text-anchor="middle" class="chapter">04</text>
    <text x="106" y="51" class="cardTitle">Permission &amp; Safety</text>
    <text x="30" y="90" class="tag">Keep tool calls controlled</text>
    <text x="30" y="112" class="cardText">Risk levels, deny-first defaults,</text>
    <text x="30" y="136" class="cardText">least privilege, and audit logs block</text>
    <text x="30" y="160" class="cardText">overreach and risky actions outside Runtime.</text>
  </g>

  <g transform="translate(910 665)" filter="url(#shadow)">
    <rect width="410" height="166" rx="10" fill="#FFFFFF" stroke="#FDBA74" stroke-width="2"/>
    <rect x="28" y="26" width="58" height="34" rx="17" fill="#EA580C"/>
    <text x="57" y="49" text-anchor="middle" class="chapter">03</text>
    <text x="106" y="51" class="cardTitle">Execution &amp; Feedback</text>
    <text x="30" y="90" class="tag">Feed tool results into the next round</text>
    <text x="30" y="112" class="cardText">Runtime handles validation, timeouts,</text>
    <text x="30" y="136" class="cardText">retries, and structured errors, then turns</text>
    <text x="30" y="160" class="cardText">them into decision-ready Observations.</text>
  </g>

  <g filter="url(#shadow)">
    <circle cx="700" cy="490" r="138" fill="url(#core)"/>
    <circle cx="700" cy="490" r="114" fill="none" stroke="#FFFFFF" stroke-opacity="0.38" stroke-width="2"/>
    <text x="700" y="482" text-anchor="middle" class="coreTitle">Agent Tool</text>
    <text x="700" y="530" text-anchor="middle" class="coreTitle">System Mechanism</text>
  </g>
</svg>
