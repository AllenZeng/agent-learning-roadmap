name: Deploy MkDocs site to Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare MkDocs source directory
        run: |
          mkdir -p docs
          ln -s ../README.md docs/README.md
          ln -s ../README.en.md docs/README.en.md
          ln -s ../CONTRIBUTING.md docs/CONTRIBUTING.md
          ln -s ../CONTRIBUTING.en.md docs/CONTRIBUTING.en.md
          ln -s ../syllabus.md docs/syllabus.md
          ln -s ../syllabus.en.md docs/syllabus.en.md
          ln -s ../courses docs/courses
          ln -s ../courses-en docs/courses-en
          ln -s ../examples docs/examples
          ln -s ../reference docs/reference
          ln -s ../assets docs/assets
          ln -s ../assets-en docs/assets-en

      - name: Build site
        run: mkdocs build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
